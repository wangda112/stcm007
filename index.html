<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0b0b0b">
  <meta name="description" content="Token Connect 一对一客户服务，复制微信号 stcm007，添加微信获得专属服务。">
  <title>Token Connect｜添加微信获取一对一服务</title>
  <link rel="icon" href="assets/brand-icon.jpg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="noise" aria-hidden="true"></div>

  <header class="site-header">
    <a class="brand" href="#" aria-label="Token Connect 首页">
      <img src="assets/brand-icon.jpg" alt="Token Connect">
      <span>TOKEN CONNECT</span>
    </a>
    <span class="header-status"><i></i> 在线服务</span>
  </header>

  <main>
    <section class="hero">
      <div class="hero-copy">
        <p class="eyebrow">ONE-TO-ONE SERVICE · 专属服务通道</p>
        <h1>有问题，<br><span>微信上直接聊。</span></h1>
        <p class="lead">添加我的微信，发送您的订单或问题，我会为您提供一对一协助。</p>

        <div class="wechat-card">
          <div class="wechat-label">
            <span>我的微信号</span>
            <span class="verified">本人微信</span>
          </div>
          <div class="wechat-id">
            <strong id="wechatId">stcm007</strong>
            <button class="icon-button" id="copySmall" type="button" aria-label="复制微信号">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 8V5a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-3M5 8h9a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-9a2 2 0 0 1 2-2Z"/></svg>
            </button>
          </div>
          <button class="primary-button" id="addWechat" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8.4 4C4.9 4 2 6.5 2 9.5c0 1.7.9 3.2 2.4 4.2L3.8 16l2.6-1.3c.7.2 1.3.3 2 .3h.5a5.8 5.8 0 0 1-.2-1.5c0-3.4 3.2-6.2 7.1-6.2h.5C15.3 5.4 12.2 4 8.4 4Z"/><path d="M22 13.5c0-2.7-2.7-4.9-6.1-4.9s-6.1 2.2-6.1 4.9 2.7 4.9 6.1 4.9c.6 0 1.2-.1 1.8-.2l2.2 1.1-.5-1.9c1.6-.9 2.6-2.3 2.6-3.9Z"/></svg>
            复制微信号并打开微信
          </button>
          <p class="tip">点击后微信号会自动复制，进入微信粘贴搜索即可</p>
        </div>

        <div class="trust-row" aria-label="服务特点">
          <span><i>01</i> 本人对接</span>
          <span><i>02</i> 一对一服务</span>
          <span><i>03</i> 售后无忧</span>
        </div>
      </div>

      <div class="hero-art" aria-hidden="true">
        <div class="art-frame">
          <img src="assets/hero-brand.jpg" alt="Token Connect 黑金品牌标志">
          <div class="orbit orbit-one"></div>
          <div class="orbit orbit-two"></div>
        </div>
        <p>DIALOGUE · TRUST · CONNECTION</p>
      </div>
    </section>

  </main>

  <footer>
    <span>© TOKEN CONNECT · 对话 · 信任 · 连接 · 服务</span>
  </footer>

  <div class="mobile-bar">
    <div>
      <span>微信号</span>
      <strong>stcm007</strong>
    </div>
    <button id="mobileAdd" type="button">复制并打开微信</button>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite">
    <strong>微信号已复制</strong>
    <span>正在尝试打开微信…</span>
  </div>

  <script src="app.js"></script>
</body>
</html>
